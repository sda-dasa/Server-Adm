# Исправленный ci-cd.yml - сервер сам забирает обновления
name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.modified, 'tests/') }}
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build and test
      uses: docker/build-push-action@v4
      with:
        context: .
        load: true
        tags: app:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Start test database
      run: |
        docker run -d --name test-db \
          -e POSTGRES_USER=kubsu \
          -e POSTGRES_PASSWORD=kubsu \
          -e POSTGRES_DB=kubsu \
          -p 5432:5432 \
          postgres:15-alpine
    
    - name: Wait for database
      run: |
        for i in {1..30}; do
          if docker exec test-db pg_isready -U kubsu; then
            echo "Database is ready"
            break
          fi
          sleep 1
        done
    
    - name: Run tests
      run: |
        docker run --rm \
          --network container:test-db \
          -e DB_HOST=localhost \
          -e DB_USER=kubsu \
          -e DB_PASSWORD=kubsu \
          -e DB_NAME=kubsu \
          app:test \
          python -m pytest tests/ -v
    
    - name: Cleanup
      if: always()
      run: |
        docker stop test-db || true
        docker rm test-db || true
    
    - name: Push to registry (GitHub Container Registry)
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Push production image
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      run: |
        docker tag app:test ghcr.io/${{ github.repository }}/app:latest
        docker push ghcr.io/${{ github.repository }}/app:latest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    # Этот job ничего не деплоит, а только создает webhook
    steps:
    - name: Trigger deployment on server
      run: |
        echo "Deployment will be triggered by server itself"
        # Опционально: отправляем уведомление на сервер через webhook
        # curl -X POST http://212.192.134.135:8048/webhook/deploy || true
