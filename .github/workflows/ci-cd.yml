name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
    paths-ignore:  # НЕ запускать тесты при изменениях в tests/
      - 'tests/**'
  pull_request:
    branches: [ master, main ]
    paths-ignore:
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    # Пропускаем тесты, если только тесты и изменились
    if: ${{ !contains(github.event.head_commit.modified, 'tests/') }}
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build image
      uses: docker/build-push-action@v4
      with:
        context: .
        load: true
        tags: app:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Start test database
      run: |
        docker run -d --name test-db \
          -e POSTGRES_USER=kubsu \
          -e POSTGRES_PASSWORD=kubsu \
          -e POSTGRES_DB=kubsu \
          -p 5432:5432 \
          postgres:15-alpine
    
    - name: Wait for database
      run: |
        for i in {1..30}; do
          if docker exec test-db pg_isready -U kubsu; then
            echo "Database is ready"
            break
          fi
          sleep 1
        done
    
    - name: Run tests in container
      run: |
        docker run --rm \
          --network container:test-db \
          -e DB_HOST=localhost \
          -e DB_USER=kubsu \
          -e DB_PASSWORD=kubsu \
          -e DB_NAME=kubsu \
          app:test \
          python -m pytest tests/ -v
    
    - name: Cleanup
      if: always()
      run: |
        docker stop test-db || true
        docker rm test-db || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Build production image
      run: |
        docker build -t app:prod .
        docker save app:prod | gzip > app.tar.gz
    
    - name: Deploy to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ vars.DEPLOY_HOST }}        # Используем vars вместо secrets
        port: ${{ vars.DEPLOY_PORT }}        # если это не секрет
        username: ${{ vars.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        source: "app.tar.gz"
        target: "/home/${{ vars.DEPLOY_USER }}/tasks/"
        rm: true
        debug: true
    
    - name: Deploy and run
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ vars.DEPLOY_HOST }}
        port: ${{ vars.DEPLOY_PORT }}
        username: ${{ vars.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd /home/${{ vars.DEPLOY_USER }}/tasks/
          
          # Загружаем образ
          podman load < app.tar.gz
          rm app.tar.gz
          
          # Останавливаем и удаляем старый контейнер
          podman stop app-${{ vars.DEPLOY_USER }} || true
          podman rm app-${{ vars.DEPLOY_USER }} || true
          
          # Запускаем новый контейнер
          podman run -d \
            --name app-${{ vars.DEPLOY_USER }} \
            --restart unless-stopped \
            -p 8048:8048 \
            -e DB_HOST=${{ vars.DB_HOST }} \
            -e DB_PORT=${{ vars.DB_PORT }} \
            -e DB_USER=${{ vars.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=${{ vars.DB_NAME }} \
            app:prod
          
          # Очищаем старые образы
          podman image prune -f
          
          # Проверяем, что контейнер запустился
          sleep 5
          podman ps | grep app-${{ vars.DEPLOY_USER }}
